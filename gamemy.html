<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cyber Overdrive: Stealth UI</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><style>
:root { --r: #f0f; }
body{margin:0;padding:0;overflow:hidden;background:#000;font-family:monospace;user-select:none;touch-action:none}
canvas#c{position:fixed;top:0;left:0;display:block;width:100vw;height:100vh;z-index:1}

/* NÚT TẮT/MỞ MENU NHANH */
#toggleUI{position:fixed; top:10px; left:10px; width:40px; height:40px; background:rgba(0,0,0,0.8); border:2px solid var(--r); color:var(--r); font-size:24px; font-weight:bold; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:110; box-shadow: 0 0 10px var(--r)}

/* HUD LƠ LỬNG */
#h{position:fixed;top:10px;left:0;width:100%;display:flex;justify-content:center;gap:10px;pointer-events:none;z-index:90;transition:0.3s}
.stat{background:rgba(0,0,0,0.6);padding:5px 10px;border-radius:10px;border:1px solid var(--r);font-size:11px;color:#0f0;pointer-events:auto}

/* ADMIN PANEL */
#admP{display:none;position:fixed;right:10px;top:60px;background:rgba(0,0,0,0.85);border:1px solid var(--r);padding:10px;z-index:100;border-radius:12px;width:140px;transition:0.3s}
button{background:#111;color:var(--r);border:1px solid var(--r);padding:5px;font-size:10px;cursor:pointer;width:100%;margin:2px;border-radius:4px}

/* ĐIỀU KHIỂN */
#ctrls{transition:0.3s}
#joy-o{position:fixed;bottom:30px;left:30px;width:100px;height:100px;background:rgba(255,255,255,0.1);border:2px solid var(--r);border-radius:50%;z-index:80}
#joy-i{position:absolute;top:30px;left:30px;width:40px;height:40px;background:var(--r);border-radius:50%;opacity:0.6;pointer-events:none}
#atk-btn{position:fixed;bottom:35px;right:35px;width:75px;height:75px;background:rgba(255,0,0,0.3);border:2px solid var(--r);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:25px;z-index:80;color:white;cursor:pointer}

input{width:40px;background:#000;color:#0f0;border:1px solid #0f0;font-size:10px}
</style></head><body>

    <canvas id="c"></canvas>

    <!-- NÚT ĐIỀU KHIỂN CHÍNH -->
    <div id="toggleUI" onclick="tUI()">-</div>

    <div id="h">
        <div class="stat">BIT:<span id="mD">0</span></div>
        <div class="stat">HP:<span id="hpD">100</span></div>
        <div class="stat">RANK:<span id="rN" style="color:var(--r)">Đồng</span></div>
        <div class="stat"><input type="text" id="cdI" placeholder="CODE"><button onclick="fC()" style="width:auto;display:inline;padding:2px 5px;margin:0">OK</button></div>
    </div>

    <div id="admP">
        <button onclick="fH()" id="bH">AIMBOT: OFF</button>
        <div style="text-align:center;margin:5px 0">
            <canvas id="pC" width="70" height="70" style="background:#111;border-radius:50%;border:1px solid var(--r);cursor:crosshair"></canvas>
            <div style="font-size:8px;color:var(--r)">WARP: DBL CLICK</div>
        </div>
        <button onclick="fI()" id="bI">GOD MODE: OFF</button>
    </div>

    <div id="ctrls">
        <div id="atk-btn">🔥</div>
        <div id="joy-o"><div id="joy-i"></div></div>
    </div>

<script>
    const v=document.getElementById('c'), x=v.getContext('2d'), jo=document.getElementById('joy-o'), ji=document.getElementById('joy-i');
    const pC=document.getElementById('pC'), pxCtx=pC.getContext('2d');
    let uiVisible = true;

    function resize() { v.width=window.innerWidth; v.height=window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    let px=v.width/2, py=v.height/2, bit=0, hp=100, bl=[], jx=0, jy=0, isD=false, hue=0;
    let enX=v.width+50, enY=v.height/2, isI=false, isH=false, aimA=0, keys={};

    // TẮT/MỞ MENU
    function tUI() {
        uiVisible = !uiVisible;
        const btn = document.getElementById('toggleUI');
        const h = document.getElementById('h');
        const ctrls = document.getElementById('ctrls');
        const adm = document.getElementById('admP');
        
        btn.innerText = uiVisible ? "-" : "+";
        h.style.opacity = uiVisible ? "1" : "0";
        h.style.pointerEvents = uiVisible ? "auto" : "none";
        ctrls.style.opacity = uiVisible ? "1" : "0";
        ctrls.style.pointerEvents = uiVisible ? "auto" : "none";
        if(!uiVisible) adm.style.display = "none";
    }

    function rainbow() { hue=(hue+2)%360; let c=`hsl(${hue},100%,50%)`; document.documentElement.style.setProperty('--r',c); requestAnimationFrame(rainbow); }
    rainbow();

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    const handleInput = (ex, ey, active) => {
        if(!active) { jx=0; jy=0; ji.style.transform='translate(0,0)'; return; }
        const r=jo.getBoundingClientRect(), cx=r.left+50, cy=r.top+50;
        let dx=ex-cx, dy=ey-cy, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>40){ dx*=40/dist; dy*=40/dist; }
        ji.style.transform=`translate(${dx}px,${dy}px)`; jx=dx/40; jy=dy/40;
    };

    jo.addEventListener('mousedown', e => isD=true);
    window.addEventListener('mousemove', e => { if(isD) handleInput(e.clientX, e.clientY, true); });
    window.addEventListener('mouseup', () => { isD=false; handleInput(0,0,false); });
    jo.addEventListener('touchstart', e => { isD=true; handleInput(e.touches.clientX, e.touches.clientY, true); }, {passive:false});
    window.addEventListener('touchmove', e => { if(isD) handleInput(e.touches.clientX, e.touches.clientY, true); }, {passive:false});
    window.addEventListener('touchend', () => { isD=false; handleInput(0,0,false); });

    pC.onmousedown=e=>{let r=pC.getBoundingClientRect(); aimA=Math.atan2(e.clientY-r.top-35, e.clientX-r.left-35);};
    pC.ondblclick=e=>{let r=pC.getBoundingClientRect(); px=(e.clientX-r.left-35)*15 + v.width/2; py=(e.clientY-r.top-35)*15 + v.height/2; bl.push({x:px,y:py,s:1});};

    function fC(){ if(document.getElementById('cdI').value==='menulaso1') document.getElementById('admP').style.display='block'; }
    function fH(){ isH=!isH; document.getElementById('bH').style.background=isH?'#0f0':'#111'; }
    function fI(){ isI=!isI; document.getElementById('bI').style.background=isI?'#0f0':'#111'; hp=isI?999:100; }

    function update() {
        if(keys['w']||keys['arrowup']) py-=8; if(keys['s']||keys['arrowdown']) py+=8;
        if(keys['a']||keys['arrowleft']) px-=8; if(keys['d']||keys['arrowright']) px+=8;
        px+=jx*10; py+=jy*10;
        px=Math.max(20, Math.min(v.width-20,px)); py=Math.max(20, Math.min(v.height-20,py));
        if(enX<-50){ enX=v.width+50; enY=Math.random()*v.height; if(!isI)hp-=10; } enX-=7;
        bl.forEach((b,i)=>{
            if(b.s){ bl.splice(i,1); return; }
            if(isH){ let ang=Math.atan2(enY-b.y, enX-b.x); b.x+=Math.cos(ang)*20; b.y+=Math.sin(ang)*20; }
            else { b.x+=Math.cos(b.a)*20; b.y+=Math.sin(b.a)*20; }
            if(Math.hypot(b.x-enX,b.y-enY)<40){ enX=v.width+50; bl.splice(i,1); bit+=10; }
            if(b.x<0||b.x>v.width||b.y<0||b.y>v.height) bl.splice(i,1);
        });
        document.getElementById('mD').innerText=bit; document.getElementById('hpD').innerText=hp;
    }

    function draw(){
        x.fillStyle="#000"; x.fillRect(0,0,v.width,v.height);
        update();
        let c=`hsl(${hue},100%,50%)`;
        x.font="40px Arial";
        if(isI){ x.shadowBlur=20; x.shadowColor=c; x.fillStyle=c; } else x.fillStyle="white";
        x.fillText(isI?"🔱":"🐱", px-20, py+15); x.shadowBlur=0;
        x.fillStyle="white"; x.fillText("👾", enX, enY);
        bl.forEach(b => { x.fillStyle=c; x.fillRect(b.x,b.y,10,10); });
        pxCtx.clearRect(0,0,70,70); pxCtx.strokeStyle=c; pxCtx.beginPath(); pxCtx.arc(35,35,30,0,7); pxCtx.stroke();
        pxCtx.fillStyle=c; pxCtx.beginPath(); pxCtx.arc(35+Math.cos(aimA)*25,35+Math.sin(aimA)*25,4,0,7); pxCtx.fill();
        requestAnimationFrame(draw);
    }
    document.getElementById('atk-btn').onclick=()=>bl.push({x:px,y:py,a:aimA});
    draw();
</script></body></html>
